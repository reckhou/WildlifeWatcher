name: CI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WildlifeWatcher/WildlifeWatcher.sln

      - name: Build
        run: dotnet build src/WildlifeWatcher/WildlifeWatcher.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/WildlifeWatcher/WildlifeWatcher.sln --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
